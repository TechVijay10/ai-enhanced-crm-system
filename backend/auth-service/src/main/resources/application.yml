server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: system
    password: oracle
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: crmSecretKey2025SuperSecureKeyForJWTTokenGenerationAtLeast256Bits
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
